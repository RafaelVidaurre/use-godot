name: Audit Homebrew formula

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ""
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      plan:
        description: Optional cargo-dist plan JSON
        required: false
        type: string
        default: ""
      version:
        description: Release version to normalize and audit
        required: true
        type: string

jobs:
  normalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out release tooling
        uses: actions/checkout@v6
        with:
          path: use-godot

      - name: Check out tap
        uses: actions/checkout@v6
        with:
          repository: RafaelVidaurre/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Normalize generated formula
        shell: bash
        working-directory: homebrew-tap
        env:
          DIST_PLAN: ${{ inputs.plan }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          version="$RELEASE_VERSION"
          if [[ -z "$version" ]]; then
            version="$(jq -er '
              [.releases[].app_version] | unique |
              if length == 1 then .[0] else error("ambiguous release versions") end
            ' <<<"$DIST_PLAN")"
          fi

          python3 ../use-godot/scripts/normalize-homebrew-formula.py \
            --formula Formula/ug.rb \
            --version "$version"

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Formula/ug.rb
            git commit -m "chore: audit ug Homebrew formula"
          fi

      - name: Publish normalized formula
        shell: bash
        working-directory: homebrew-tap
        run: |
          git push

  audit:
    needs: normalize
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
          - name: Linux x86_64
            os: ubuntu-24.04
    name: audit (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out tap
        uses: actions/checkout@v6
        with:
          repository: RafaelVidaurre/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Select Linuxbrew
        if: runner.os == 'Linux'
        shell: bash
        run: |
          test -x /home/linuxbrew/.linuxbrew/bin/brew
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Audit and test formula
        shell: bash
        run: |
          brew tap --custom-remote RafaelVidaurre/tap "$GITHUB_WORKSPACE"
          formula="$(brew --repository RafaelVidaurre/tap)/Formula/ug.rb"
          brew style "$formula"
          brew audit --strict --online RafaelVidaurre/tap/ug
          brew install RafaelVidaurre/tap/ug
          brew test RafaelVidaurre/tap/ug
