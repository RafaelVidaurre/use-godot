name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Scan reachable history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: quality
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Validate release installer sources
        shell: bash
        run: |
          python3 scripts/test-normalize-homebrew-formula.py
          python3 scripts/render-release-installers.py --output-dir "$RUNNER_TEMP/installers"
          shellcheck scripts/*.sh "$RUNNER_TEMP/installers/use-godot-installer.sh"
      - name: Validate the published source package
        shell: bash
        run: |
          files="$(cargo package --locked --no-verify --list)"
          if grep -Eq '^(\.beads/|\.github/|AGENTS\.md$|CLAUDE\.md$)' <<<"$files"; then
            printf '%s\n' "Internal repository files entered the source package:" >&2
            grep -E '^(\.beads/|\.github/|AGENTS\.md$|CLAUDE\.md$)' <<<"$files" >&2
            exit 1
          fi
          cargo package --locked --no-verify

  test:
    name: test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            os: ubuntu-24.04
            python: python3
          - name: ubuntu-24.04-arm
            os: ubuntu-24.04-arm
            python: python3
          - name: macos-15
            os: macos-15
            python: python3
          - name: macos-15-intel
            os: macos-15-intel
            python: python3
          - name: windows-2025
            os: windows-2025
            python: python
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.name }}
      - run: cargo test --all-targets --locked
      - run: cargo build --release --locked
      - name: Exercise the native release installer
        run: ${{ matrix.python }} scripts/smoke-release-installers.py

  msrv:
    name: Rust 1.85 MSRV
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # 1.85.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: msrv-1.85
      - run: cargo test --all-targets --locked
