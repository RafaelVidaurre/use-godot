name: release policy

on:
  workflow_call:

permissions:
  contents: read

jobs:
  version:
    name: release version policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check version metadata
        run: ./scripts/check-version-policy.sh
      - name: Check release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/check-version-policy.sh --tag "$GITHUB_REF_NAME"
