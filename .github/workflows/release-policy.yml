name: release policy

on:
  workflow_call:

permissions:
  contents: read

jobs:
  version:
    name: release version policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check version metadata
        run: ./scripts/check-version-policy.sh
      - name: Check release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/check-version-policy.sh --tag "$GITHUB_REF_NAME"
