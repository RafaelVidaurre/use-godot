[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Homebrew is generated by dist. The shell and PowerShell installers are
# project-owned extra artifacts so their default behavior remains non-invasive.
installers = ["homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# Build every release artifact on pull requests so platform support is proven
# before it is merged or advertised.
pr-run-mode = "upload"
# Publish a SHA-256 file beside every native archive.
checksum = "sha256"
# Whether to install an updater program
install-updater = false
# A GitHub repo to push Homebrew formulas to
tap = "RafaelVidaurre/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Post-announce jobs to run in CI
post-announce-jobs = ["./homebrew-audit"]
# Plan jobs to run in CI
plan-jobs = ["./release-policy"]

[[dist.extra-artifacts]]
artifacts = [
    "target/release-installers/use-godot-installer.sh",
    "target/release-installers/use-godot-installer.ps1",
]
build = [
    "python3",
    "scripts/render-release-installers.py",
    "--output-dir",
    "target/release-installers",
]

[dist.github-custom-runners]
aarch64-apple-darwin = "macos-15"
x86_64-apple-darwin = "macos-15-intel"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
x86_64-unknown-linux-gnu = "ubuntu-24.04"
x86_64-pc-windows-msvc = "windows-2025"
